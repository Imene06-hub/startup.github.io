<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahraz Connect | Mon Panier</title>
    <link rel="stylesheet" href="panier.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Ahraz Connect</div>
        <nav class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="panier.html" class="active">Panier</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="cart-container">
        <div class="cart-content">
            <div class="image-section">
                <div class="image-card">
                    <img src="A3ADACE4-EFD0-4DF3-A42B-4DF3DDB3B26A.jpg" alt="Ahraz Connect">
                </div>
            </div>

            <div class="form-section">
                <p class="section-label">MON PANIER</p>
                <h1>Votre Commande</h1>

                <form action="https://docs.google.com/forms/d/e/1FAIpQLSe4d6qlDgtpjzhx-ljMjBHsc2md76LBXKfjsmADRe2UYUoghg/formResponse" method="POST">
                    
                    <div class="form-group">
                        <label>Nombre de pièces <span>(obligatoire)</span></label>
                        <select name="entry.661398390" id="qty-select" required>
                            <option value="0">Sélectionner une option</option>
                            <option value="1">1 pièce</option>
                            <option value="2">2 pièces</option>
                            <option value="3">3 pièces</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Taille de la gourmette (cm) <span>(obligatoire)</span></label>
                        <input type="text" name="entry.1203888138" placeholder="Ex: 18cm" required>
                    </div>

                    <div class="summary-card">
                        <p>Prix par pièce : <strong>5 000 DA</strong></p>
                        <p>Livraison : <strong>1 000 DA</strong></p>
                        <hr>
                        <p class="total-text">Total : <span id="total-amount">0</span> DA</p>
                    </div>

                    <h2 class="delivery-title">Livraison</h2>
                    <div class="radio-group">
                        <label><input type="radio" name="entry.1364527642" value="A domicile" checked> A domicile</label>
                        <label><input type="radio" name="entry.1364527642" value="Au bureau"> Au bureau de livraison</label>
                    </div>

                    <div class="form-group">
                        <label>Adresse de livraison <span>(obligatoire)</span></label>
                        <input type="text" name="entry.1391177222" required>
                    </div>

                    <button type="submit" class="btn-valider">Valider</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const qtySelect = document.getElementById('qty-select');
        const totalAmount = document.getElementById('total-amount');
        const form = document.querySelector('form');

        qtySelect.addEventListener('change', () => {
            const qty = parseInt(qtySelect.value) || 0;
            const total = qty > 0 ? (qty * 5000) + 1000 : 0;
            totalAmount.textContent = total;
        });

        form.onsubmit = function(e) {
            const finalTotal = totalAmount.textContent;
            setTimeout(() => {
                window.location.href = 'paiement.html?total=' + finalTotal;
            }, 500);
        };
    </script>
</body>
</html>
