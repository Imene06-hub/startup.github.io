    <script>
        // 1. Base de données des tarifs de livraison (selon ton image)
        const tarifsLivraison = {
            31: { domicile: 500, bureau: 250 },
            27: { domicile: 700, bureau: 300 },
            16: { domicile: 700, bureau: 300 },
            46: { domicile: 800, bureau: 300 },
            44: { domicile: 800, bureau: 350 },
            5: { domicile: 800, bureau: 350 },
            6: { domicile: 800, bureau: 350 },
            9: { domicile: 800, bureau: 350 },
            34: { domicile: 800, bureau: 350 },
            10: { domicile: 800, bureau: 350 },
            35: { domicile: 800, bureau: 350 },
            2: { domicile: 800, bureau: 350 },
            26: { domicile: 800, bureau: 350 },
            43: { domicile: 800, bureau: null }, // Mila
            21: { domicile: 800, bureau: 350 },
            28: { domicile: 800, bureau: 350 },
            25: { domicile: 800, bureau: 350 },
            4: { domicile: 800, bureau: 350 },
            19: { domicile: 800, bureau: 350 },
            42: { domicile: 800, bureau: 350 },
            15: { domicile: 800, bureau: 350 },
            29: { domicile: 800, bureau: 350 },
            48: { domicile: 800, bureau: null }, // Relizane
            22: { domicile: 800, bureau: 350 },
            20: { domicile: 800, bureau: 350 },
            14: { domicile: 800, bureau: 350 },
            13: { domicile: 800, bureau: 350 },
            23: { domicile: 800, bureau: 350 },
            18: { domicile: 800, bureau: 350 },
            38: { domicile: 800, bureau: null }, // Tissemsilt
            40: { domicile: 850, bureau: 350 },
            36: { domicile: 900, bureau: null }, // El Tarf
            24: { domicile: 900, bureau: 400 },
            41: { domicile: 900, bureau: null }, // Souk Ahrass
            12: { domicile: 900, bureau: 400 },
            7: { domicile: 1000, bureau: 500 },
            51: { domicile: 1000, bureau: null }, // Ouled Djellal
            17: { domicile: 1000, bureau: 500 },
            3: { domicile: 1000, bureau: 500 },
            39: { domicile: 1100, bureau: null }, // El Oued
            57: { domicile: 1100, bureau: null }, // El M'ghair
            47: { domicile: 1100, bureau: 500 },
            58: { domicile: 1100, bureau: null }, // El Meniaa
            30: { domicile: 1100, bureau: 500 },
            55: { domicile: 1100, bureau: 500 },
            8: { domicile: 1200, bureau: 600 },
            52: { domicile: 1200, bureau: null }, // Beni Abbes
            32: { domicile: 1200, bureau: null }, // El Bayadh
            45: { domicile: 1200, bureau: 600 },
            1: { domicile: 1500, bureau: 750 },
            49: { domicile: 1500, bureau: null }, // Timimoun
            37: { domicile: 1500, bureau: null }, // Tindouf
            53: { domicile: 1850, bureau: null }, // In Salah
            11: { domicile: 2000, bureau: 1000 },
            33: { domicile: 2000, bureau: null }  // Illizi
        };

        // 2. Récupération de tous les éléments du HTML
        const qtySelect = document.getElementById('qty-select');
        const totalAmount = document.getElementById('total-amount');
        const btnTotal = document.getElementById('btn-total');
        const wilayaSelect = document.getElementById('wilaya-select');
        const radioDomicile = document.querySelector('input[value="A domicile"]');
        const radioBureau = document.querySelector('input[value="Au bureau (Stop Desk)"]');
        const addressExacteGroup = document.getElementById('address-exacte-group');
        const adresseExacteInput = document.getElementById('adresse-exacte-input');
        const affichageFraisLivraison = document.getElementById('frais-livraison');
        const erreurLivraison = document.getElementById('erreur-livraison');
        const btnValider = document.querySelector('.btn-valider');

        // Prix d'une seule pièce de ton produit
        const PRIX_UNITAIRE_PRODUIT = 7000;

        // 3. Fonction Moteur : elle calcule tout dès que l'utilisateur clique/change un champ
        function updateOrderDetails() {
            // A. Calcul de base du produit (Quantité * 7000 DA)
            const qty = parseInt(qtySelect.value) || 1;
            const totalProduits = qty * PRIX_UNITAIRE_PRODUIT;

            // B. Vérifier le mode de livraison choisi
            const modeLivraison = radioDomicile.checked ? 'domicile' : 'bureau';

            // Afficher ou cacher l'adresse exacte selon le choix
            if (modeLivraison === 'domicile') {
                addressExacteGroup.style.display = 'block';
                adresseExacteInput.required = true;
            } else {
                addressExacteGroup.style.display = 'none';
                adresseExacteInput.required = false;
                adresseExacteInput.value = "";
            }

            // C. Calcul des frais de livraison
            let prixLivraison = 0;
            let stopDeskIndisponible = false;

            // Si une wilaya a été choisie
            if (wilayaSelect.value !== "") {
                // Extraire le numéro (ex: "31 - Oran" devient le chiffre 31)
                const codeWilaya = parseInt(wilayaSelect.value);
                const tarifsWilaya = tarifsLivraison[codeWilaya];

                if (tarifsWilaya) {
                    prixLivraison = tarifsWilaya[modeLivraison];

                    // Si le Stop Desk (bureau) est sélectionné mais vaut "null" dans la liste
                    if (modeLivraison === 'bureau' && prixLivraison === null) {
                        stopDeskIndisponible = true;
                        prixLivraison = 0;
                    }
                } else {
                    // Sécurité : prix par défaut si wilaya inconnue
                    prixLivraison = (modeLivraison === 'domicile') ? 1000 : 500;
                }
            }

            // D. Affichage du résultat final sur l'écran
            if (stopDeskIndisponible) {
                // Bloquer l'achat car Stop Desk indisponible
                affichageFraisLivraison.textContent = "---";
                erreurLivraison.style.display = "block";
                btnValider.disabled = true;
                btnValider.style.opacity = "0.5";
                btnTotal.textContent = "---";
                totalAmount.textContent = "---";
            } else {
                // Tout est bon, on affiche les calculs
                erreurLivraison.style.display = "none";
                btnValider.disabled = false;
                btnValider.style.opacity = "1";

                if (wilayaSelect.value === "") {
                    // L'utilisateur n'a pas encore choisi sa wilaya
                    affichageFraisLivraison.textContent = "--";
                    totalAmount.textContent = totalProduits;
                    btnTotal.textContent = totalProduits;
                } else {
                    // Addition finale : Prix Produits + Prix Livraison
                    affichageFraisLivraison.textContent = prixLivraison;
                    const prixFinal = totalProduits + prixLivraison;
                    totalAmount.textContent = prixFinal;
                    btnTotal.textContent = prixFinal;
                }
            }
        }

        // 4. Écouteurs d'évènements : on prévient le navigateur qu'il doit relancer le calcul si l'utilisateur touche à ces boutons
        qtySelect.addEventListener('change', updateOrderDetails);
        wilayaSelect.addEventListener('change', updateOrderDetails);
        radioDomicile.addEventListener('change', updateOrderDetails);
        radioBureau.addEventListener('change', updateOrderDetails);

        // 5. Initialiser les bons montants au démarrage de la page
        updateOrderDetails();
        // --- FORMATAGE DU NUMÉRO DE CARTE ---
        // On récupère le champ grâce à son attribut "name"
        const cardNumberInput = document.querySelector('input[name="entry.823093172"]');

        cardNumberInput.addEventListener('input', function (e) {
            // 1. On supprime tout ce qui n'est pas un chiffre (lettres, symboles, anciens espaces)
            let value = e.target.value.replace(/\D/g, '');

            // 2. On bloque la longueur à 16 chiffres maximum (au cas où)
            if (value.length > 16) {
                value = value.substring(0, 16);
            }

            // 3. On ajoute un espace tous les 4 chiffres
            // Le .trim() empêche d'avoir un espace inutile à la toute fin
            let formattedValue = value.replace(/(.{4})/g, '$1 ').trim();

            // 4. On remplace le texte du champ par la version formatée
            e.target.value = formattedValue;
        });
    </script>
</body>
