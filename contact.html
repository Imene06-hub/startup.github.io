<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahraz Connect | Contact</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <header class="main-header">
        <div class="logo">Ahraz Connect</div>
        <nav class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="panier.html">Panier</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="contact-container">
        <div class="contact-box">
            <p class="section-label">UNE QUESTION ?</p>
            <h1>Contactez-nous</h1>
            <p class="contact-intro">Notre équipe d'artisans et de techniciens vous répond sous 24h.</p>

            <form action="https://docs.google.com/forms/d/e/1FAIpQLSd2Mp45MvZSPIzPlOoyqnC7SRB7zeiR-UqpfzRh3BKKd49f9A/formResponse" method="POST">
                
                <div class="form-group">
                    <label>Nom complet <span>(obligatoire)</span></label>
                    <input type="text" name="entry.1020210725" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label>E-mail <span>(obligatoire)</span></label>
                    <input type="email" name="entry.279054121" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label>Votre message <span>(obligatoire)</span></label>
                    <textarea name="entry.23351988" placeholder="Comment pouvons-nous vous aider ?" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn-contact">Envoyer le message</button>
            </form>

            <div class="contact-footer">
                <p>📍 Tizi-Ouzou, Algeria</p>
                <p>📱 +213 (0) 555 555 555</p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>© 2026 Ahraz Connect</p>
    </footer>

</body>
</html>
