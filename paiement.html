<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahraz Connect | Validation du paiement</title>
    <link rel="stylesheet" href="paiment.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Ahraz Connect</div>
        <nav class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="panier.html" class="active"> Panier</a>
            <a href="contact.html">Contact</a>

        </nav>
    </header>

    <main class="payment-container">
        <div class="payment-box">
            <p class="section-label">ÉTAPE FINALE</p>
            <h1>Valider ma commande</h1>

            <form action="https://docs.google.com/forms/d/e/1FAIpQLSfOj3_D1YR-59iI4Dy8WUBgFA4XroGKVPV0WoZY97oM37iZHQ/formResponse" method="POST">
                
                <div class="form-section-title">Vos informations</div>
                
                <div class="form-group">
                    <label>Nom et Prénom <span>(obligatoire)</span></label>
                    <input type="text" name="entry.1624202085" placeholder="Votre nom complet" required>
                </div>

                <div class="form-group">
                    <label>E-mail <span>(obligatoire)</span></label>
                    <input type="email" name="entry.1504958611" placeholder="exemple@mail.com" required>
                </div>

                <div class="form-section-title">Détails de la carte</div>
                
                <div class="form-group">
                    <label>Numéro de carte <span>(obligatoire)</span></label>
                    <input type="text" name="entry.1983058866" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>Date d'expiration <span>(obligatoire)</span></label>
                        <input type="text" name="entry.694184891" placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div class="form-group flex-1">
                        <label>CCV <span>(obligatoire)</span></label>
                        <input type="text" name="entry.1246997290" placeholder="123" maxlength="3" required>
                    </div>
                </div>

                <div class="final-summary">
                    <div class="summary-line">
                        <span>Total à régler :</span>
                        <span class="total-price"><span id="display-total">0</span> DA</span>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-back" onclick="window.history.back()">← Retour</button>
                    <button type="submit" class="btn-submit">Valider ma commande</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Récupération du prix calculé dans la page précédente
        const urlParams = new URLSearchParams(window.location.search);
        const totalRecu = urlParams.get('total') || "0";
        document.getElementById('display-total').textContent = totalRecu;
    </script>

</body>
</html>
